      <p class="small-label">ABOUT URUSHI</p>
      <h2>漆は、ただ美しいだけではない。</h2>

      <p>
        漆は、光を吸い込み、時間とともに表情を変える素材である。
        艶やかな表面の奥には、深い黒、不穏さ、触れてはいけないような緊張感がある。
      </p>

      <p>
        しかし、その少し怖い気配こそが、漆の魅力でもある。
        朱は身体の温度を思わせ、黒は闇のように深く沈んでいく。
        戸田蓉子の作品は、その漆の力を通して、人の感覚や記憶に静かに触れてくる。
      </p>
    </section>
